<!DOCTYPE html>
<html>
<head>

<title>Admin Panel</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#0f0f14;
color:#ffffff;
font-family:'Segoe UI',Arial;
}

/* CONTENT CONTAINER */

.container{
padding:40px;
}

/* NAVBAR */

.navbar{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:black;
border-bottom:1px solid #222;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:22px;
font-weight:600;
letter-spacing:1px;
cursor:pointer;
}

.nav-links{
display:flex;
gap:30px;
}

.nav-links a{
color:white;
text-decoration:none;
font-size:16px;
transition:0.3s;
}

.nav-links a:hover{
color:#b6a3ff;
}

/* BUTTONS */

button{
padding:10px 18px;
background:linear-gradient(45deg,#7c5cff,#a78bfa);
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-weight:500;
transition:0.3s;
margin:5px;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 10px rgba(167,139,250,0.6);
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-bottom:40px;
background:#1b1b24;
border-radius:8px;
overflow:hidden;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

thead{
background:#262633;
}

th{
padding:14px;
text-align:left;
font-weight:500;
border-bottom:1px solid #333;
}

td{
padding:12px;
border-bottom:1px solid #2c2c38;
}

tr:hover{
background:#242432;
}

/* INPUT */

input,select{
padding:10px;
width:320px;
margin:6px 0;
border:none;
border-radius:6px;
background:#262633;
color:white;
outline:none;
transition:0.2s;
}

input:focus,select:focus{
box-shadow:0 0 5px #7c5cff;
}

h2{
margin-top:40px;
font-weight:500;
}

h3{
color:#cfcfff;
}

</style>

</head>

<body>


<!-- NAVBAR -->

<div class="navbar">

<div class="logo" onclick="goHome()">
SkillSprint.
</div>

<div class="nav-links">

<a href="#" onclick="goHome()">Home</a>
<a href="#" onclick="goCourses()">Courses</a>
<a href="#" onclick="logout()">Logout</a>

</div>

</div>


<div class="container">


<!-- USERS -->

<h2>Users</h2>

<button onclick="loadUsers()">Load Users</button>

<table>

<thead>

<tr>

<th>Name</th>
<th>Email</th>
<th>Role</th>

</tr>

</thead>

<tbody id="users"></tbody>

</table>



<!-- ADD COURSE -->

<h2>Add Course</h2>

<input id="courseName" placeholder="Course Name">
<br>

<input id="courseImage" placeholder="Image URL">
<br>

<input id="courseDesc" placeholder="Description">
<br>

<button onclick="addCourse()">Add Course</button>



<!-- DELETE COURSE -->

<h2>Delete Course</h2>

<button onclick="loadCourses()">Show Courses</button>

<table>

<thead>

<tr>

<th>Course Name</th>
<th>Action</th>

</tr>

</thead>

<tbody id="courses"></tbody>

</table>

<!-- COURSE REQUESTS -->

<h2>Course Requests</h2>

<button onclick="loadRequests()">

Show Requests

</button>

<table>

<thead>

<tr>

<th>Student Email</th>

<th>Course</th>

<th>Action</th>

</tr>

</thead>

<tbody id="requests"></tbody>

</table>

<!-- APPROVED STUDENTS -->

<h2>Approved Students</h2>

<button onclick="loadApproved()">
Show Approved Students
</button>

<table>

<thead>

<tr>

<th>Student Email</th>
<th>Approved Courses</th>

</tr>

</thead>

<tbody id="approved"></tbody>

</table>

<!-- ADD VIDEO -->

<h2>Add Video</h2>

<label>Select Course</label>
<br>

<select id="videoCourse"></select>

<br><br>

<input id="videoTitle" placeholder="Video Title">
<br>

<input id="videoId" placeholder="Youtube Video ID">
<br>

<button onclick="addVideo()">Add Video</button>


<br><br>

<h3>Videos in Selected Course</h3>

<table>

<thead>

<tr>
<th>Title</th>
<th>Action</th>
</tr>

</thead>

<tbody id="courseVideos"></tbody>

</table>


<!-- DELETE VIDEO -->

<h2>Delete Video</h2>

<button onclick="loadVideos()">Show Videos</button>

<table>

<thead>

<tr>

<th>Course</th>
<th>Title</th>
<th>Action</th>

</tr>

</thead>

<tbody id="videos"></tbody>

</table>

</div>



<script>

/* NAVIGATION */

function goHome(){
window.location="index.html";
}

function goCourses(){
window.location="courses.html";
}

function logout(){

firebase.auth().signOut().then(()=>{

window.location="login.html";

});

}


/* LOAD USERS */

function loadUsers(){

fetch("http://localhost:3000/users")

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach(user=>{

html+=`

<tr>

<td>${user.name}</td>

<td>${user.email}</td>

<td>${user.role}</td>

</tr>

`;

});

users.innerHTML=html;

});

}



/* ADD COURSE */

function addCourse(){

if(courseName.value.trim()==""){

alert("Enter Course Name");
return;

}

if(!courseImage.value.startsWith("http")){

alert("Enter Valid Image URL");
return;

}

fetch("http://localhost:3000/addCourse",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:courseName.value.trim(),
image:courseImage.value.trim(),
description:courseDesc.value.trim()

})

})

.then(res=>res.text())

.then(data=>{

alert(data);

courseName.value="";
courseImage.value="";
courseDesc.value="";

loadCourses();

});

}



/* LOAD COURSES */

function loadCourses(){

fetch("http://localhost:3000/courses")

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach(course=>{

html+=`

<tr>

<td>${course.name}</td>

<td>

<button onclick="deleteCourse('${encodeURIComponent(course.name)}')">

Delete

</button>

</td>

</tr>

`;

});

courses.innerHTML=html;

});

}



/* LOAD COURSES DROPDOWN */

function loadCourseDropdown(){

fetch("http://localhost:3000/courses")

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach(course=>{

html+=`<option>${course.name}</option>`;

});

videoCourse.innerHTML=html;

loadCourseVideos();

});

}



function loadCourseVideos(){

const course = videoCourse.value;

fetch("http://localhost:3000/videos/"+course)

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach(video=>{

html+=`

<tr>

<td>${video.title}</td>

<td>

<button onclick="deleteVideo('${video._id}')">

Delete

</button>

</td>

</tr>

`;

});

courseVideos.innerHTML=html;

});

}



loadCourseDropdown();

videoCourse.addEventListener("change",loadCourseVideos);



/* DELETE COURSE */

function deleteCourse(name){

fetch("http://localhost:3000/deleteCourse/"+name,{

method:"DELETE"

})

.then(res=>res.text())

.then(data=>{

alert(data);

loadCourses();

});

}



/* ADD VIDEO */

function addVideo(){

fetch("http://localhost:3000/addVideo",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

course:videoCourse.value,
title:videoTitle.value,
videoId:videoId.value

})

})

.then(res=>res.text())

.then(data=>{

alert(data);

videoTitle.value="";
videoId.value="";

loadCourseVideos();

});

}



/* LOAD VIDEOS */

function loadVideos(){

fetch("http://localhost:3000/allVideos")

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach(video=>{

html+=`

<tr>

<td>${video.course}</td>

<td>${video.title}</td>

<td>

<button onclick="deleteVideo('${video._id}')">

Delete

</button>

</td>

</tr>

`;

});

videos.innerHTML=html;

});

}



/* DELETE VIDEO */

function deleteVideo(id){

fetch("http://localhost:3000/deleteVideo/"+id,{

method:"DELETE"

})

.then(res=>res.text())

.then(data=>{

alert(data);

loadVideos();

});

}



/* LOAD REQUESTS */

function loadRequests(){

fetch("http://localhost:3000/requests")

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach(user=>{

if(user.requestedCourses){

user.requestedCourses.forEach(course=>{

html+=`

<tr>

<td>${user.email}</td>

<td>${course}</td>

<td>

<button onclick="approve(
'${user.email}',
'${course}'
)">

Approve

</button>

</td>

</tr>

`;

});

}

});

requests.innerHTML=html;

});

}



/* APPROVE COURSE */

function approve(email,course){

fetch("http://localhost:3000/approveCourse",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:email,
course:course

})

})

.then(res=>res.text())

.then(data=>{

alert("Course Approved");

loadRequests();

});

}



/* LOAD APPROVED STUDENTS */

function loadApproved(){

fetch("http://localhost:3000/users")

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach(user=>{

if(user.approvedCourses && user.approvedCourses.length>0){

html+=`

<tr>

<td>${user.email}</td>

<td>

${user.approvedCourses.join(", ")}

</td>

</tr>

`;

}

});

approved.innerHTML=html;

});

}

</script>

</body>
</html>
