<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | SkillSprint</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    font-family:'Poppins',sans-serif;
    color:#fff;
}

.box{
    width:420px;
    padding:40px;
    border:1px solid #333;
    border-radius:15px;
    background:#0a0a0a;
    opacity:0;
    transform:translateY(120px) scale(.95);
    animation:entry 1.1s cubic-bezier(.22,.61,.36,1) forwards;
}

@keyframes entry{
    to{opacity:1;transform:translateY(0) scale(1);}
}

h2{
    text-align:center;
    margin-bottom:30px;
    font-weight:600;
}

input{
    width:100%;
    padding:14px 20px;
    margin-bottom:18px;
    background:#000;
    border:1px solid #444;
    border-radius:30px;
    color:#fff;
    outline:none;
}

input:focus{border-color:#b6a3ff;}

.checkbox{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:13px;
    color:#ccc;
    margin-bottom:20px;
    white-space:nowrap;
}

button{
    width:100%;
    padding:14px;
    background:#b6a3ff;
    border:none;
    border-radius:30px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

button:hover{background:#9f8cff;}

.divider{
    display:flex;
    align-items:center;
    margin:25px 0;
    color:#666;
    font-size:13px;
}

.divider::before,
.divider::after{
    content:"";
    flex:1;
    height:1px;
    background:#333;
}

.divider span{padding:0 10px;}

.social{
    display:flex;
    justify-content:center;
    gap:15px;
}

.social button{
    width:55px;
    height:55px;
    border-radius:15px;
    background:#000;
    border:1px solid #444;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.social img{width:22px;}

.terms{
    text-align:center;
    font-size:12px;
    color:#777;
    margin-top:20px;
}

.terms a{color:#b6a3ff;text-decoration:none;}

.login{
    text-align:center;
    margin-top:20px;
    font-size:14px;
}

.login a{
    color:#b6a3ff;
    font-weight:600;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="box">
    <h2>Sign up with email</h2>

    <input type="text" placeholder="Full name">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <div class="checkbox">
        <input type="checkbox" checked>
        <span>Send me special offers, and learning tips.</span>
    </div>

    <button onclick="signup()">Continue</button>

    <div class="divider">
        <span>Other sign up options</span>
    </div>

    <div class="social">
        <!-- GOOGLE LOGIN -->
        <button onclick="googleLogin()">
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
        </button>

        <!-- FACEBOOK (future) -->
        <button>
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
        </button>

        <!-- APPLE -->
        <button>
            <img src="https://cdn-icons-png.flaticon.com/512/831/831276.png">
        </button>
    </div>

    <div class="terms">
        By signing up, you agree to our
        <a href="#">Terms of Use</a> and
        <a href="#">Privacy Policy</a>.
    </div>

    <div class="login">
        Already have an account? <a href="login.html">Log in</a>
    </div>
</div>

<!-- 🔥 FIREBASE SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBBb-HWoQ9TqwwkDk887G0oPeGvJo7hMfs",
  authDomain: "skillsprint-a4eb3.firebaseapp.com",
  projectId: "skillsprint-a4eb3",
  storageBucket: "skillsprint-a4eb3.appspot.com",
  messagingSenderId: "99219317801",
  appId: "1:99219317801:web:85ed7c3b7d062a69216838"
};

firebase.initializeApp(firebaseConfig);


/* SIGNUP FUNCTION */

function signup(){

const name = document.querySelector("input[type=text]").value.trim();
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;

if(!name || !email || !password){
alert("Fill all fields");
return;
}

/* Create Firebase User */

firebase.auth().createUserWithEmailAndPassword(email,password)

.then((userCredential)=>{

const user = userCredential.user;

/* Set display name */

user.updateProfile({
displayName:name
});

/* Save in MongoDB */

fetch("http://localhost:3000/saveUser",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

uid:user.uid,
name:name,
email:user.email

})

})

.then(()=>{

alert("Signup Successful");
window.location="index.html";

});

})

.catch((error)=>{

alert(error.message);

});

}


/* GOOGLE SIGNUP */

function googleLogin(){

const provider = new firebase.auth.GoogleAuthProvider();

firebase.auth().signInWithPopup(provider)

.then((result)=>{

const user = result.user;

/* Save in MongoDB */

fetch("http://localhost:3000/saveUser",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

uid:user.uid,
name:user.displayName || "User",
email:user.email

})

})

.then(()=>{

window.location="index.html";

});

})

.catch((error)=>{

alert(error.message);

});

}

</script>

</body>
</html>
