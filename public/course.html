<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Course | SkillSprint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:radial-gradient(circle at top,#111 0%,#000 60%);
color:#fff;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
position:sticky;
top:0;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(12px);
border-bottom:1px solid #222;
}

nav a{
color:#fff;
margin-left:30px;
text-decoration:none;
}

nav a:hover{
color:#b6a3ff;
}

/* MAIN */

.main{
display:flex;
min-height:calc(100vh - 80px);
}

/* SIDEBAR */

.sidebar{

width:320px;

background:#111;

border-right:1px solid #222;

padding:30px;

overflow:auto;

}

.sidebar h2{

margin-bottom:20px;

}

/* CHAPTER */

.chapter{

padding:16px;

margin-bottom:10px;

background:#151515;

border-radius:12px;

cursor:pointer;

transition:.3s;

}

.chapter:hover{

transform:translateX(5px);

background:#1b1b1b;

}

.chapter.active{

background:#b6a3ff;

color:black;

font-weight:600;

}

/* CONTENT */

.content{

flex:1;

padding:40px;

}

/* VIDEO */

.video-container{

max-width:900px;

margin:auto;

background:#111;

padding:20px;

border-radius:20px;

border:1px solid #222;

}

iframe{

width:100%;

height:500px;

border-radius:15px;

}

</style>

</head>

<body>


<!-- NAVBAR -->

<nav>

<strong>SkillSprint</strong>

<div>

<a href="index.html">Home</a>

<a href="courses.html">Courses</a>

</div>

</nav>



<div class="main">


<!-- SIDEBAR -->

<div class="sidebar">

<h2 id="courseTitle">Course</h2>

<div id="videoList"></div>

</div>



<!-- CONTENT -->

<div class="content">

<div class="video-container">

<iframe id="videoPlayer"

src=""

allowfullscreen>

</iframe>

</div>

<br>

<center>

<button id="buyBtn"

style="
padding:14px 40px;
background:#b6a3ff;
border:none;
border-radius:25px;
font-size:16px;
cursor:pointer;
"

onclick="buyCourse()"

>

Buy Course

</button>

</center>

</div>

</div>


<script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from
"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


const firebaseConfig = {

apiKey:"AIzaSyBBb-HWoQ9TqwwkDk887G0oPeGvJo7hMfs",

authDomain:"skillsprint-a4eb3.firebaseapp.com",

projectId:"skillsprint-a4eb3",

storageBucket:"skillsprint-a4eb3.appspot.com",

messagingSenderId:"99219317801",

appId:"1:99219317801:web:85ed7c3b7d062a69216838"

};

const app = initializeApp(firebaseConfig);

const auth=getAuth(app);

window.auth=auth;


/* GET COURSE NAME */

const params=new URLSearchParams(window.location.search);

const course=params.get("name");

courseTitle.innerText=course;



/* WAIT FOR LOGIN */

onAuthStateChanged(auth,(user)=>{

let email="";

if(user){

email=user.email;

buyBtn.innerText="Buy Course";

}else{

buyBtn.innerText="Login to Buy";

}



/* CHECK ACCESS */

fetch("http://localhost:3000/checkAccess?email="+email+"&course="+course)

.then(res=>res.text())

.then(access=>{


/* LOAD VIDEOS */

fetch("http://localhost:3000/videos/"+course)

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach((video,index)=>{

html+=`

<div class="chapter
${index==0?'active':''}"

onclick="${
access=="yes"
?
`playVideo('${video.videoId}',this)`
:
(index==0
?
`playVideo('${video.videoId}',this)`
:
`alert('Course Locked 🔒')`
)
}"

>

${index+1}. ${video.title}
${access=="yes" ? "" : (index>0?" 🔒":"")}

</div>

`;

});

videoList.innerHTML=html;


/* FIRST VIDEO */

if(data.length>0){

videoPlayer.src=

"https://www.youtube.com/embed/"+data[0].videoId;

}


/* IF APPROVED */

if(access=="yes"){

buyBtn.innerText="Enrolled ✅";

buyBtn.disabled=true;

buyBtn.style.background="green";

}

});


});

});



/* PLAY VIDEO */

window.playVideo=function(id,element){

videoPlayer.src=

"https://www.youtube.com/embed/"+id;

document.querySelectorAll(".chapter")

.forEach(c=>c.classList.remove("active"));

element.classList.add("active");

}


/* BUY COURSE */

window.buyCourse=function(){

const user=auth.currentUser;

if(!user){

alert("Please Login First");

window.location="login.html";

return;

}

fetch("http://localhost:3000/requestCourse",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

email:user.email,
course:course

})

})

.then(res=>res.text())

.then(data=>{

alert(data);

buyBtn.innerText="Requested ⏳";

buyBtn.disabled=true;

});

}

</script>




</body>

</html>
