<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Course | SkillSprint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:radial-gradient(circle at top,#111 0%,#000 60%);
color:#fff;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
position:sticky;
top:0;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(12px);
border-bottom:1px solid #222;
}

nav a{
color:#fff;
margin-left:30px;
text-decoration:none;
}

nav a:hover{
color:#b6a3ff;
}

/* MAIN */

.main{
display:flex;
min-height:calc(100vh - 80px);
}

/* SIDEBAR */

.sidebar{

width:320px;

background:#111;

border-right:1px solid #222;

padding:30px;

overflow:auto;

}

.sidebar h2{

margin-bottom:20px;

}

/* CHAPTER */

.chapter{

padding:16px;

margin-bottom:10px;

background:#151515;

border-radius:12px;

cursor:pointer;

transition:.3s;

}

.chapter:hover{

transform:translateX(5px);

background:#1b1b1b;

}

.chapter.active{

background:#b6a3ff;

color:black;

font-weight:600;

}

/* CONTENT */

.content{

flex:1;

padding:40px;

}

/* VIDEO */

.video-container{

max-width:900px;

margin:auto;

background:#111;

padding:20px;

border-radius:20px;

border:1px solid #222;

}

iframe{

width:100%;

height:500px;

border-radius:15px;

}

</style>

</head>

<body>


<!-- NAVBAR -->

<nav>

<strong>SkillSprint</strong>

<div>

<a href="index.html">Home</a>

<a href="courses.html">Courses</a>

</div>

</nav>



<div class="main">


<!-- SIDEBAR -->

<div class="sidebar">

<h2 id="courseTitle">Course</h2>

<div id="videoList"></div>

</div>



<!-- CONTENT -->

<div class="content">

<div class="video-container">

<iframe id="videoPlayer"

src=""

allowfullscreen>

</iframe>

</div>

</div>

</div>



<script>


/* GET COURSE NAME */

const params=new URLSearchParams(window.location.search);

const course=params.get("name");


document.getElementById("courseTitle").innerText=course;



/* LOAD VIDEOS */

fetch("http://localhost:3000/videos/"+course)

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach((video,index)=>{


html+=`

<div class="chapter

${index==0?'active':''}"

onclick="playVideo('${video.videoId}',this)"

>

${index+1}. ${video.title}

</div>

`;

});


document.getElementById("videoList").innerHTML=html;


/* FIRST VIDEO AUTO LOAD */

if(data.length>0){

document.getElementById("videoPlayer").src=

"https://www.youtube.com/embed/"+data[0].videoId;

}

});


/* PLAY VIDEO */

function playVideo(id,element){

document.getElementById("videoPlayer").src=

"https://www.youtube.com/embed/"+id;


/* ACTIVE CHAPTER */

document.querySelectorAll(".chapter")

.forEach(c=>c.classList.remove("active"));

element.classList.add("active");

}


</script>


</body>

</html>
